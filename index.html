<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Podcast Design Canvas — New Episode</title>
    <link rel="stylesheet" href="app/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Podcast Design Canvas</span>
      </div>
      <span class="step-pill">Step 1 of 6 · Set up episode</span>
    </header>

    <main>
      <div class="intro">
        <h1>Start a new episode</h1>
        <p>
          Bring in your synced recording, tell us who is speaking, and add a few
          social links so the edit can get names and context right. Next you will
          polish audio, pick a visual style, and preview how your speakers will appear.
        </p>
      </div>

      <div id="app"><!-- setup wizard renders here --></div>
    </main>

    <script src="app/episode-setup.js"></script>
    <script src="app/episode-style.js"></script>
    <script src="app/audio-polish.js"></script>
    <script src="app/canvas-layers.js"></script>
    <script src="app/canvas-editor.js"></script>
    <script src="app/show-templates.js"></script>
    <script src="app/visual-moments.js"></script>
    <script src="app/episode-setup.ui.js"></script>
  </body>
</html>
